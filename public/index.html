<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./favicon-spring.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Tableau de bord du Service Center ANAVEO – Printemps 2026 ! Suivi en temps réel des performances sous le soleil." />
  <title>ANAVEO - 🌸 Centre d'Opérations du Printemps 2026</title>

  <!-- 🌸 Polices élégantes pour le thème Printemps -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- 🌸 Styles globaux + éléments printaniers tombants -->
  <style>
    /* === Variables et styles de base === */
    :root {
      --spring-bg: #87CEEB;          /* Bleu ciel */
      --spring-paper: #FFFFFF;       /* Blanc */
      --spring-primary: #90EE90;     /* Vert clair */
      --spring-secondary: #FFB6C1;   /* Rose clair */
      --spring-error: #FF6B6B;
      --spring-success: #7CFC00;     /* Vert printemps */
      --spring-warning: #FFD700;
      --spring-text: #2F4F4F;        /* Gris ardoise */
      --spring-flower: #FF69B4;      /* Rose vif */
      --spring-butterfly: #8A2BE2;   /* Violet papillon */
      --spring-sun: #FFD700;         /* Jaune soleil */
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      background-color: var(--spring-bg);
      color: var(--spring-text);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      position: relative;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    /* === Arrière-plan décoratif printanier (effet ciel et nuages) === */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.3) 0%, transparent 40%),
        radial-gradient(circle at 70% 40%, rgba(255, 255, 255, 0.25) 0%, transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* === Écran de chargement printanier === */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #87CEEB 0%, #90EE90 100%);
      z-index: 1000;
      transition: opacity 0.5s;
    }

    .loading-content {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      border: 2px solid #90EE90;
      max-width: 90vw;
      font-family: 'Montserrat', sans-serif;
      color: #2F4F4F;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
    }

    .spring-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #FF69B4;
      text-shadow: 0 0 12px rgba(255, 105, 180, 0.6);
      animation: bloom-flower 3s ease-in-out infinite;
    }

    @keyframes bloom-flower {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.2) rotate(15deg); }
    }

    /* === Éléments printaniers tombants – totalement opaques et colorés === */
    .falling-spring {
      position: fixed;
      top: -100px;
      font-size: 24px;
      opacity: 1;
      pointer-events: none;
      z-index: 1;
      animation: fall-spring linear infinite;
      text-shadow: 
        0 0 8px rgba(255, 255, 255, 0.8),
        0 0 16px rgba(255, 255, 255, 0.6);
      will-change: transform;
    }

    @keyframes fall-spring {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    /* === Variations individuelles (fleurs, papillons, oiseaux de différentes tailles et styles) === */
    .falling-spring:nth-child(1)  { left: 5%;  animation-duration: 18s;  animation-delay: 0s;   font-size: 32px; color: #FF69B4; }
    .falling-spring:nth-child(2)  { left: 15%; animation-duration: 22s;  animation-delay: 1s;   font-size: 28px; color: #8A2BE2; }
    .falling-spring:nth-child(3)  { left: 25%; animation-duration: 15s;  animation-delay: 0.5s; font-size: 30px; color: #FFD700; }
    .falling-spring:nth-child(4)  { left: 35%; animation-duration: 25s;  animation-delay: 2s;   font-size: 34px; color: #90EE90; }
    .falling-spring:nth-child(5)  { left: 45%; animation-duration: 20s;  animation-delay: 1.2s; font-size: 26px; color: #FF69B4; }
    .falling-spring:nth-child(6)  { left: 55%; animation-duration: 23s;  animation-delay: 0.8s; font-size: 32px; color: #8A2BE2; }
    .falling-spring:nth-child(7)  { left: 65%; animation-duration: 17s;  animation-delay: 1.5s; font-size: 28px; color: #FFD700; }
    .falling-spring:nth-child(8)  { left: 75%; animation-duration: 21s;  animation-delay: 0.3s; font-size: 30px; color: #90EE90; }
    .falling-spring:nth-child(9)  { left: 85%; animation-duration: 24s;  animation-delay: 1.8s; font-size: 24px; color: #FF69B4; }
    .falling-spring:nth-child(10) { left: 10%; animation-duration: 19s;  animation-delay: 0.7s; font-size: 26px; color: #8A2BE2; }
    .falling-spring:nth-child(11) { left: 20%; animation-duration: 22s;  animation-delay: 1.1s; font-size: 32px; color: #FFD700; }
    .falling-spring:nth-child(12) { left: 30%; animation-duration: 16s;  animation-delay: 0.9s; font-size: 28px; color: #90EE90; }
    .falling-spring:nth-child(13) { left: 40%; animation-duration: 20s;  animation-delay: 0.4s; font-size: 30px; color: #FF69B4; }
    .falling-spring:nth-child(14) { left: 50%; animation-duration: 23s;  animation-delay: 1.3s; font-size: 24px; color: #8A2BE2; }
    .falling-spring:nth-child(15) { left: 60%; animation-duration: 18s;  animation-delay: 0.6s; font-size: 32px; color: #FFD700; }
    .falling-spring:nth-child(16) { left: 70%; animation-duration: 21s;  animation-delay: 1.7s; font-size: 26px; color: #90EE90; }
    .falling-spring:nth-child(17) { left: 80%; animation-duration: 19s;  animation-delay: 0.2s; font-size: 28px; color: #FF69B4; }
    .falling-spring:nth-child(18) { left: 90%; animation-duration: 22s;  animation-delay: 1.4s; font-size: 30px; color: #8A2BE2; }
    .falling-spring:nth-child(19) { left: 5%;  animation-duration: 16s;  animation-delay: 0.1s; font-size: 24px; color: #FFD700; }
    .falling-spring:nth-child(20) { left: 12%; animation-duration: 24s;  animation-delay: 1.9s; font-size: 32px; color: #90EE90; }
    .falling-spring:nth-child(21) { left: 18%; animation-duration: 19s;  animation-delay: 0.5s; font-size: 28px; color: #FF69B4; }
    .falling-spring:nth-child(22) { left: 28%; animation-duration: 23s;  animation-delay: 1.0s; font-size: 30px; color: #8A2BE2; }
    .falling-spring:nth-child(23) { left: 38%; animation-duration: 17s;  animation-delay: 0.7s; font-size: 26px; color: #FFD700; }
    .falling-spring:nth-child(24) { left: 48%; animation-duration: 21s;  animation-delay: 1.6s; font-size: 32px; color: #90EE90; }
  </style>
</head>

  <!-- 🌸 Écran de chargement Printemps -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="spring-icon">🌸</div>
      Le printemps s'éveille…
    </div>
  </div>

  <!-- ✅ Conteneur React -->
  <div id="root"></div>

  <!-- Masquer l'écran de chargement après le chargement initial -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }, 800);
    });
  </script>
</body>
</html>
