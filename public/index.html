<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./favicon-vendredi.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Tableau de bord du Service Center ANAVEO – Vendredi 13 ! Suivi en temps réel des performances dans une ambiance horrifique." />
  <title>ANAVEO - 🔪 Centre d'Opérations du Vendredi 13</title>

  <!-- 🔪 Polices pour le thème Vendredi 13 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Orbitron:wght@700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- 🔪 Styles globaux + effets horrifiques -->
  <style>
    /* === Variables et styles de base === */
    :root {
      --friday-bg: #0a0a0a;
      --friday-primary: #8b0000;      /* Rouge sang */
      --friday-secondary: #a9a9a9;    /* Gris cendre */
      --friday-accent: #ff0000;       /* Rouge vif */
      --friday-gold: #8b4513;         /* Marron sang séché */
      --friday-purple: #4b0000;       /* Pourpre foncé */
      --friday-text: #e0e0e0;
      --friday-error: #ff1744;
      --friday-success: #8b0000;
      --friday-warning: #ff4500;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      background-color: var(--friday-bg);
      color: var(--friday-text);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      position: relative;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    /* === Arrière-plan Vendredi 13 - image effrayante === */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('./Vendredi.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 1;
      z-index: -1;
    }

    /* === Écran de chargement horrifique === */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 10, 0.95);
      z-index: 1000;
      transition: opacity 0.5s;
    }

    .loading-content {
      text-align: center;
      padding: 2rem;
      background: rgba(139, 0, 0, 0.85);
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(255, 0, 0, 0.6);
      border: 3px solid #8b0000;
      max-width: 90vw;
      font-family: 'Creepster', cursive;
      color: #ff0000;
      text-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
      font-size: 1.5rem;
    }

    .friday-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: #ff0000;
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.9);
      animation: friday-pulse 2s ease-in-out infinite;
    }

    @keyframes friday-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    /* === Effets de sang qui coule – ambiance Vendredi 13 === */
    .falling-blood {
      position: fixed;
      top: -100px;
      font-size: 30px;
      opacity: 0.85;
      pointer-events: none;
      z-index: 1;
      animation: fall-blood linear infinite;
      text-shadow: 
        0 0 6px rgba(255, 0, 0, 0.8),
        0 0 12px rgba(139, 0, 0, 0.6);
      will-change: transform;
    }

    @keyframes fall-blood {
      0% {
        transform: translateY(-10vh) rotate(0deg) scale(0.8);
      }
      100% {
        transform: translateY(110vh) rotate(360deg) scale(1);
      }
    }

    /* === Variations individuelles de gouttes de sang === */
    .falling-blood:nth-child(1)  { left: 5%;  animation-duration: 12s;  animation-delay: 0s;   font-size: 36px; color: #ff0000; }
    .falling-blood:nth-child(2)  { left: 15%; animation-duration: 15s;  animation-delay: 1s;   font-size: 30px; color: #8b0000; }
    .falling-blood:nth-child(3)  { left: 25%; animation-duration: 10s;  animation-delay: 0.5s; font-size: 33px; color: #ff0000; }
    .falling-blood:nth-child(4)  { left: 35%; animation-duration: 17s;  animation-delay: 2s;   font-size: 27px; color: #8b0000; }
    .falling-blood:nth-child(5)  { left: 45%; animation-duration: 13s;  animation-delay: 1.2s; font-size: 30px; color: #ff0000; }
    .falling-blood:nth-child(6)  { left: 55%; animation-duration: 16s;  animation-delay: 0.8s; font-size: 36px; color: #8b0000; }
    .falling-blood:nth-child(7)  { left: 65%; animation-duration: 11s;  animation-delay: 1.5s; font-size: 33px; color: #ff0000; }
    .falling-blood:nth-child(8)  { left: 75%; animation-duration: 14s;  animation-delay: 0.3s; font-size: 30px; color: #8b0000; }
    .falling-blood:nth-child(9)  { left: 85%; animation-duration: 18s;  animation-delay: 1.8s; font-size: 27px; color: #ff0000; }
    .falling-blood:nth-child(10) { left: 10%; animation-duration: 12s;  animation-delay: 0.7s; font-size: 33px; color: #8b0000; }
    .falling-blood:nth-child(11) { left: 20%; animation-duration: 15s;  animation-delay: 1.1s; font-size: 36px; color: #ff0000; }
    .falling-blood:nth-child(12) { left: 30%; animation-duration: 10s;  animation-delay: 0.9s; font-size: 30px; color: #8b0000; }
    .falling-blood:nth-child(13) { left: 40%; animation-duration: 13s;  animation-delay: 0.4s; font-size: 33px; color: #ff0000; }
    .falling-blood:nth-child(14) { left: 50%; animation-duration: 16s;  animation-delay: 1.3s; font-size: 27px; color: #8b0000; }
    .falling-blood:nth-child(15) { left: 60%; animation-duration: 12s;  animation-delay: 0.6s; font-size: 36px; color: #ff0000; }
    .falling-blood:nth-child(16) { left: 70%; animation-duration: 14s;  animation-delay: 1.7s; font-size: 30px; color: #8b0000; }
    .falling-blood:nth-child(17) { left: 80%; animation-duration: 12s;  animation-delay: 0.2s; font-size: 33px; color: #ff0000; }
    .falling-blood:nth-child(18) { left: 90%; animation-duration: 15s;  animation-delay: 1.4s; font-size: 30px; color: #8b0000; }
    .falling-blood:nth-child(19) { left: 5%;  animation-duration: 10s;  animation-delay: 0.1s; font-size: 27px; color: #ff0000; }
    .falling-blood:nth-child(20) { left: 12%; animation-duration: 18s;  animation-delay: 1.9s; font-size: 36px; color: #8b0000; }
    .falling-blood:nth-child(21) { left: 18%; animation-duration: 12s;  animation-delay: 0.5s; font-size: 33px; color: #ff0000; }
    .falling-blood:nth-child(22) { left: 28%; animation-duration: 16s;  animation-delay: 1.0s; font-size: 30px; color: #8b0000; }
    .falling-blood:nth-child(23) { left: 38%; animation-duration: 11s;  animation-delay: 0.7s; font-size: 27px; color: #ff0000; }
    .falling-blood:nth-child(24) { left: 48%; animation-duration: 14s;  animation-delay: 1.6s; font-size: 36px; color: #8b0000; }
  </style>

      <div class="friday-icon">🔪</div>
      Préparation du cauchemar…
    </div>

  <!-- ✅ Conteneur React -->
  <div id="root"></div>

  <!-- Masquer l'écran de chargement après le chargement initial -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }, 800);
    });
  </script>
