<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./favicon-autumn.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Tableau de bord automnal du Service Center ANAVEO." />
  <title>ANAVEO - 🍂 Centre d’Appels Automnal</title>

  <!-- 🍂 Polices automnales -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- 🍁 Styles globaux + feuilles tombantes -->
  <style>
    /* === Variables et styles de base === */
    body {
      margin: 0;
      background-color: #f5f0e6;
      color: #5D4037;
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(139, 92, 41, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(93, 64, 55, 0.02) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    :root {
      --autumn-bg: #f5f0e6;
      --autumn-paper: #ffffff;
      --autumn-primary: #8D6E63;
      --autumn-secondary: #A1887F;
      --autumn-error: #D32F2F;
      --autumn-success: #388E3C;
      --autumn-warning: #F57C00;
      --autumn-text: #5D4037;
      --autumn-gold: #D4AF37;
    }

    /* === Scrollbar automnale – invisible au repos, visible au scroll/hover === */
    * {
      scrollbar-width: thin;
      scrollbar-color: #8D6E63 #f5f0e6;
    }

    *::-webkit-scrollbar {
      width: 8px;
    }

    *::-webkit-scrollbar-track {
      background: #f5f0e6;
    }

    *::-webkit-scrollbar-thumb {
      background-color: #8D6E63;
      border-radius: 4px;
      visibility: hidden; /* masquée par défaut */
    }

    /* Réapparaît au scroll, hover ou focus */
    html:active::-webkit-scrollbar-thumb,
    html:hover::-webkit-scrollbar-thumb,
    html:focus-within::-webkit-scrollbar-thumb {
      visibility: visible;
    }

    /* Firefox : on rend la scrollbar transparente au repos */
    @supports (scrollbar-width: thin) {
      html {
        scrollbar-color: transparent #f5f0e6;
        transition: scrollbar-color 0.3s;
      }
      html:active,
      html:hover,
      html:focus-within {
        scrollbar-color: #8D6E63 #f5f0e6;
      }
    }

    /* === Écran de chargement === */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #f5f0e6;
      z-index: 1000;
      transition: opacity 0.5s;
    }

    .loading-content {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(141, 110, 99, 0.25);
      max-width: 90vw;
    }

    .leaf-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #8D6E63;
      animation: float-gentle 6s ease-in-out infinite;
    }

    @keyframes float-gentle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* === Feuilles tombantes – OPAQUES (pas de transparence) === */
    .falling-leaf {
      position: fixed;
      top: -50px;
      font-size: 50px;
      opacity: 1;
      pointer-events: none;
      z-index: 1;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(105vh) rotate(720deg);
        opacity: 1;
      }
    }

    /* 24 feuilles avec variations */
    .falling-leaf:nth-child(1)  { left: 5%;  animation-duration: 12s;  animation-delay: 0s;   color: #8D6E63; }
    .falling-leaf:nth-child(2)  { left: 15%; animation-duration: 15s;  animation-delay: 1s;   color: #D2691E; }
    .falling-leaf:nth-child(3)  { left: 25%; animation-duration: 10s;  animation-delay: 0.5s; color: #A1887F; }
    .falling-leaf:nth-child(4)  { left: 35%; animation-duration: 18s;  animation-delay: 2s;   color: #5D4037; }
    .falling-leaf:nth-child(5)  { left: 45%; animation-duration: 13s;  animation-delay: 1.2s; color: #8D6E63; }
    .falling-leaf:nth-child(6)  { left: 55%; animation-duration: 16s;  animation-delay: 0.8s; color: #D2691E; }
    .falling-leaf:nth-child(7)  { left: 65%; animation-duration: 11s;  animation-delay: 1.5s; color: #A1887F; }
    .falling-leaf:nth-child(8)  { left: 75%; animation-duration: 14s;  animation-delay: 0.3s; color: #5D4037; }
    .falling-leaf:nth-child(9)  { left: 85%; animation-duration: 17s;  animation-delay: 1.8s; color: #8D6E63; }
    .falling-leaf:nth-child(10) { left: 10%; animation-duration: 12.5s; animation-delay: 0.7s; color: #D2691E; }
    .falling-leaf:nth-child(11) { left: 20%; animation-duration: 15.5s; animation-delay: 1.1s; color: #A1887F; }
    .falling-leaf:nth-child(12) { left: 30%; animation-duration: 10.5s; animation-delay: 0.9s; color: #5D4037; }
    .falling-leaf:nth-child(13) { left: 40%; animation-duration: 13.5s; animation-delay: 0.4s; color: #8D6E63; }
    .falling-leaf:nth-child(14) { left: 50%; animation-duration: 16.5s; animation-delay: 1.3s; color: #D2691E; }
    .falling-leaf:nth-child(15) { left: 60%; animation-duration: 11.5s; animation-delay: 0.6s; color: #A1887F; }
    .falling-leaf:nth-child(16) { left: 70%; animation-duration: 14.5s; animation-delay: 1.7s; color: #5D4037; }
    .falling-leaf:nth-child(17) { left: 80%; animation-duration: 12.2s; animation-delay: 0.2s; color: #8D6E63; }
    .falling-leaf:nth-child(18) { left: 90%; animation-duration: 15.2s; animation-delay: 1.4s; color: #D2691E; }
    .falling-leaf:nth-child(19) { left: 5%;  animation-duration: 10.8s; animation-delay: 0.1s; color: #A1887F; }
    .falling-leaf:nth-child(20) { left: 12%; animation-duration: 17.5s; animation-delay: 1.9s; color: #5D4037; }
    .falling-leaf:nth-child(21) { left: 18%; animation-duration: 13.2s; animation-delay: 0.5s; color: #8D6E63; }
    .falling-leaf:nth-child(22) { left: 28%; animation-duration: 16.2s; animation-delay: 1.0s; color: #D2691E; }
    .falling-leaf:nth-child(23) { left: 38%; animation-duration: 11.8s; animation-delay: 0.7s; color: #A1887F; }
    .falling-leaf:nth-child(24) { left: 48%; animation-duration: 14.8s; animation-delay: 1.6s; color: #5D4037; }
  </style>
</head>
<body>

  <!-- 🍁 Écran de chargement -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="leaf-icon">🍂</div>
      Chargement du tableau de bord…
    </div>
  </div>

  <!-- ✅ Conteneur React -->
  <div id="root"></div>

  <!-- Masquer l'écran de chargement après le chargement initial -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }, 800);
    });
  </script>
</body>
</html>
