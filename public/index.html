<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./favicon-sun.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Tableau de bord du Service Center ANAVEO – Ambiance ensoleillée & lumineuse. Suivi en temps réel dans l'atmosphère du hibou." />
  <title>ANAVEO - 🦉 Centre d'Opérations Ensoleillé</title>

  <!-- 🦉 Polices élégantes pour le thème lumineux -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- 🦉 Styles globaux + ambiance soleil & lumière dorée -->
  <style>
    /* === Variables thème Soleil & Hibou === */
    :root {
      /* Fonds : bleus profonds, nuit étoilée (contraste avec le soleil) */
      --sun-bg-primary: #0a0e17;
      --sun-bg-secondary: #1a2332;
      --sun-bg-tertiary: #2c3e50;
      --sun-slate: #34495e;
      --sun-night: #1c2833;
      
      /* Accents : doré, jaune, orange clair (rayons du soleil) */
      --sun-gold: #ffd700;
      --sun-yellow: #ffaa00;
      --sun-orange: #ff8c00;
      --sun-glow: #ffcc00;
      --sun-light: rgba(255, 215, 0, 0.4);
      
      /* Texte & contrastes */
      --sun-text: #ecf0f1;
      --sun-text-muted: #bdc3c7;
      --sun-text-dim: #7f8c8d;
      
      /* États */
      --sun-error: #e74c3c;
      --sun-success: #27ae60;
      --sun-warning: #f39c12;
      
      /* Glassmorphism */
      --glass-bg: rgba(26, 35, 50, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --glass-highlight: rgba(255, 255, 255, 0.05);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background-color: var(--sun-bg-primary);
      color: var(--sun-text);
      font-family: 'Roboto', sans-serif;
    }

    body {
      min-height: 100vh;
      position: relative;
      -ms-overflow-style: none;
      scrollbar-width: thin;
      scrollbar-color: var(--sun-slate) var(--sun-bg-secondary);
      /* Dégradé ciel nocturne avec lueur dorée */
      background: 
        linear-gradient(180deg, var(--sun-bg-primary) 0%, var(--sun-bg-secondary) 50%, var(--sun-bg-tertiary) 100%);
    }

    body::-webkit-scrollbar {
      width: 8px;
    }
    body::-webkit-scrollbar-track {
      background: var(--sun-bg-secondary);
    }
    body::-webkit-scrollbar-thumb {
      background: var(--sun-slate);
      border-radius: 4px;
    }

    /* === Arrière-plan : effet soleil subtil + lueur ambiante === */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        /* Lueur dorée diffuse (soleil) */
        radial-gradient(ellipse at 20% 15%, rgba(255, 215, 0, 0.1) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 85%, rgba(255, 170, 0, 0.08) 0%, transparent 45%),
        /* Texture de lumière très subtile */
        repeating-linear-gradient(
          110deg,
          transparent,
          transparent 2px,
          rgba(255, 255, 255, 0.02) 2px,
          rgba(255, 255, 255, 0.02) 4px
        );
      pointer-events: none;
      z-index: 0;
      animation: sun-shift 20s linear infinite;
    }

    @keyframes sun-shift {
      0% { background-position: 0 0, 0 0, 0 0; }
      100% { background-position: 0 0, 0 0, 100px 100px; }
    }

    /* === Particules de soleil flottantes === */
    .sunray {
      position: fixed;
      bottom: -20px;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, rgba(255, 220, 0, 0.9), rgba(255, 180, 0, 0.5), transparent);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
      animation: float-sun linear infinite;
      box-shadow: 0 0 10px rgba(255, 220, 0, 0.6), 0 0 20px rgba(255, 180, 0, 0.3);
    }

    @keyframes float-sun {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      50% {
        transform: translateY(-30vh) translateX(20px) scale(1.2);
        opacity: 0.9;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(-110vh) translateX(-10px) scale(0.8);
        opacity: 0;
      }
    }

    /* Variations des particules */
    .sunray:nth-child(odd) { animation-duration: 4s; }
    .sunray:nth-child(even) { animation-duration: 6s; }
    .sunray:nth-child(3n) { animation-duration: 5s; width: 6px; height: 6px; }
    .sunray:nth-child(5n) { animation-duration: 7s; width: 8px; height: 8px; opacity: 0.95; }

    /* === Écran de chargement – Ambiance lumineuse === */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at center, var(--sun-bg-secondary) 0%, var(--sun-bg-primary) 70%);
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    .loading-content {
      text-align: center;
      padding: 2.5rem 3rem;
      /* Glassmorphism */
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--glass-shadow);
      max-width: 90vw;
      font-family: 'Montserrat', sans-serif;
      color: var(--sun-text);
      position: relative;
      overflow: hidden;
    }

    /* Lueur interne subtile */
    .loading-content::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 60%);
      pointer-events: none;
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .owl-icon {
      font-size: 3.5rem;
      margin-bottom: 1.2rem;
      color: var(--sun-gold);
      text-shadow: 0 0 20px var(--sun-light);
      animation: owl-blink 4s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    @keyframes owl-blink {
      0%, 48%, 52%, 100% { transform: scale(1); }
      50% { transform: scale(0.98); }
    }

    .loading-text {
      position: relative;
      z-index: 2;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .loading-subtext {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: var(--sun-text-muted);
      font-weight: 300;
    }

    /* === Effets Glassmorphism réutilisables === */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: var(--glass-shadow);
      transition: all 0.3s ease;
    }

    .glass-panel:hover {
      border-color: rgba(255, 215, 0, 0.3);
      box-shadow: 
        var(--glass-shadow),
        0 0 25px rgba(255, 215, 0, 0.2);
      transform: translateY(-2px);
    }

    /* === Effet lumineux au survol === */
    .sunray-hover {
      position: relative;
      overflow: hidden;
    }

    .sunray-hover::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 220, 0, 0.15) 0%, transparent 70%);
      opacity: 0;
      transform: scale(0.3);
      transition: all 0.4s ease;
      pointer-events: none;
      border-radius: 50%;
    }

    .sunray-hover:hover::before {
      opacity: 1;
      transform: scale(1);
      animation: sunray-ripple 0.6s ease-out;
    }

    @keyframes sunray-ripple {
      0% { transform: scale(0.3); opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* === Boutons avec accent doré === */
    .btn-sun {
      background: linear-gradient(135deg, var(--sun-gold), var(--sun-yellow));
      color: var(--sun-bg-primary);
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .btn-sun:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6);
    }

    .btn-sun::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-sun:hover::after {
      left: 100%;
    }

    /* === Typographie === */
    h1, h2, h3 {
      font-family: 'Montserrat', sans-serif;
      color: var(--sun-text);
      margin: 0;
    }

    h1 {
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .text-gold { color: var(--sun-gold); }
    .text-yellow { color: var(--sun-yellow); }
    .text-muted { color: var(--sun-text-muted); }

    /* === Utilitaires === */
    .rounded-sun {
      border-radius: 24px;
    }

    .shadow-owl {
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    /* === Conteneur principal React === */
    #root {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <!-- ☀️ Particules de soleil animées en arrière-plan -->
  <div class="sunray" style="left: 5%; animation-delay: 0.1s;"></div>
  <div class="sunray" style="left: 12%; animation-delay: 0.3s;"></div>
  <div class="sunray" style="left: 18%; animation-delay: 0.5s;"></div>
  <div class="sunray" style="left: 25%; animation-delay: 0.2s;"></div>
  <div class="sunray" style="left: 32%; animation-delay: 0.7s;"></div>
  <div class="sunray" style="left: 38%; animation-delay: 0.4s;"></div>
  <div class="sunray" style="left: 45%; animation-delay: 0.9s;"></div>
  <div class="sunray" style="left: 52%; animation-delay: 0.6s;"></div>
  <div class="sunray" style="left: 58%; animation-delay: 0.1s;"></div>
  <div class="sunray" style="left: 65%; animation-delay: 0.8s;"></div>
  <div class="sunray" style="left: 72%; animation-delay: 0.3s;"></div>
  <div class="sunray" style="left: 78%; animation-delay: 0.5s;"></div>
  <div class="sunray" style="left: 85%; animation-delay: 0.2s;"></div>
  <div class="sunray" style="left: 92%; animation-delay: 0.7s;"></div>
  <div class="sunray" style="left: 8%; animation-delay: 0.4s;"></div>
  <div class="sunray" style="left: 15%; animation-delay: 0.9s;"></div>
  <div class="sunray" style="left: 22%; animation-delay: 0.6s;"></div>
  <div class="sunray" style="left: 29%; animation-delay: 0.1s;"></div>
  <div class="sunray" style="left: 36%; animation-delay: 0.8s;"></div>
  <div class="sunray" style="left: 43%; animation-delay: 0.3s;"></div>
  <div class="sunray" style="left: 50%; animation-delay: 0.5s;"></div>
  <div class="sunray" style="left: 57%; animation-delay: 0.2s;"></div>
  <div class="sunray" style="left: 64%; animation-delay: 0.7s;"></div>
  <div class="sunray" style="left: 71%; animation-delay: 0.4s;"></div>


  <!-- 🦉 Écran de chargement – Ambiance lumineuse -->
  <div id="loading-screen">
    <div class="loading-content glass-panel">
      <div class="owl-icon">🦉</div>
      <div class="loading-text">La lumière se prépare…</div>
      <span class="loading-subtext">Chargement du tableau de bord</span>
    </div>
  </div>

  <!-- ✅ Conteneur React -->
  <div id="root"></div>

  <!-- Script de chargement -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }, 1000);
    });

    // === Génération dynamique de particules supplémentaires ===
    document.addEventListener('DOMContentLoaded', () => {
      const body = document.body;
      for (let i = 0; i < 30; i++) {
        const ray = document.createElement('div');
        ray.className = 'sunray';
        ray.style.left = Math.random() * 100 + '%';
        ray.style.animationDelay = Math.random() * 3 + 's';
        ray.style.animationDuration = (4 + Math.random() * 4) + 's';
        body.appendChild(ray);
      }
    });
  </script>
</body>
</html>
