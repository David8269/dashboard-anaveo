<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./favicon-easter.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Tableau de bord du Service Center ANAVEO – Pâques 2026 ! Suivi en temps réel des performances sous le signe des œufs et des lapins." />
  <title>ANAVEO - 🐰 Centre d'Opérations de Pâques 2026</title>

  <!-- 🐰 Polices élégantes pour le thème de Pâques -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- 🐰 Styles globaux + éléments de Pâques tombants -->
  <style>
    /* === Variables et styles de base === */
    :root {
      --easter-bg: #FFF9E6;              /* Jaune pâle */
      --easter-paper: #FFFFFF;           /* Blanc */
      --easter-primary: #FFB6C1;         /* Rose pâle */
      --easter-secondary: #DDA0DD;       /* Violet clair */
      --easter-accent: #98D8C8;          /* Vert menthe */
      --easter-gold: #FFD700;            /* Or */
      --easter-yellow: #FFF5BA;          /* Jaune crème */
      --easter-blue: #B5EAD7;            /* Bleu pastel */
      --easter-error: #ff8a80;
      --easter-success: #a5d6a7;
      --easter-warning: #ffe082;
      --easter-text: #5D4E60;            /* Violet foncé */
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      background-color: var(--easter-bg);
      color: var(--easter-text);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      position: relative;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    /* === Arrière-plan décoratif de Pâques (effet pastel et œufs) === */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(255, 182, 193, 0.3) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(221, 160, 221, 0.25) 0%, transparent 45%),
        radial-gradient(circle at 40% 70%, rgba(152, 216, 200, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 60% 90%, rgba(255, 245, 186, 0.35) 0%, transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    /* === Écran de chargement de Pâques === */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #FFB6C1 0%, #DDA0DD 50%, #98D8C8 100%);
      z-index: 1000;
      transition: opacity 0.5s;
    }

    .loading-content {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(221, 160, 221, 0.3);
      border: 3px solid #FFD700;
      max-width: 90vw;
      font-family: 'Montserrat', sans-serif;
      color: #5D4E60;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
    }

    .easter-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #DDA0DD;
      text-shadow: 0 0 12px rgba(221, 160, 221, 0.6);
      animation: bounce-easter 2s ease-in-out infinite;
    }

    @keyframes bounce-easter {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-15px) rotate(-5deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-10px) rotate(5deg); }
    }

    /* === Éléments de Pâques tombants – totalement opaques et colorés === */
    .falling-easter {
      position: fixed;
      top: -100px;
      font-size: 24px;
      opacity: 1;
      pointer-events: none;
      z-index: 1;
      animation: fall-easter linear infinite;
      text-shadow: 
        0 0 8px rgba(255, 255, 255, 0.8),
        0 0 16px rgba(255, 255, 255, 0.6);
      will-change: transform;
    }

    @keyframes fall-easter {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    /* === Variations individuelles (éléments de différentes tailles) === */
    .falling-easter:nth-child(1)  { left: 5%;  animation-duration: 18s;  animation-delay: 0s;   font-size: 32px; }
    .falling-easter:nth-child(2)  { left: 15%; animation-duration: 22s;  animation-delay: 1s;   font-size: 28px; }
    .falling-easter:nth-child(3)  { left: 25%; animation-duration: 15s;  animation-delay: 0.5s; font-size: 30px; }
    .falling-easter:nth-child(4)  { left: 35%; animation-duration: 25s;  animation-delay: 2s;   font-size: 34px; }
    .falling-easter:nth-child(5)  { left: 45%; animation-duration: 20s;  animation-delay: 1.2s; font-size: 26px; }
    .falling-easter:nth-child(6)  { left: 55%; animation-duration: 23s;  animation-delay: 0.8s; font-size: 32px; }
    .falling-easter:nth-child(7)  { left: 65%; animation-duration: 17s;  animation-delay: 1.5s; font-size: 28px; }
    .falling-easter:nth-child(8)  { left: 75%; animation-duration: 21s;  animation-delay: 0.3s; font-size: 30px; }
    .falling-easter:nth-child(9)  { left: 85%; animation-duration: 24s;  animation-delay: 1.8s; font-size: 24px; }
    .falling-easter:nth-child(10) { left: 10%; animation-duration: 19s;  animation-delay: 0.7s; font-size: 26px; }
    .falling-easter:nth-child(11) { left: 20%; animation-duration: 22s;  animation-delay: 1.1s; font-size: 32px; }
    .falling-easter:nth-child(12) { left: 30%; animation-duration: 16s;  animation-delay: 0.9s; font-size: 28px; }
    .falling-easter:nth-child(13) { left: 40%; animation-duration: 20s;  animation-delay: 0.4s; font-size: 30px; }
    .falling-easter:nth-child(14) { left: 50%; animation-duration: 23s;  animation-delay: 1.3s; font-size: 24px; }
    .falling-easter:nth-child(15) { left: 60%; animation-duration: 18s;  animation-delay: 0.6s; font-size: 32px; }
    .falling-easter:nth-child(16) { left: 70%; animation-duration: 21s;  animation-delay: 1.7s; font-size: 26px; }
    .falling-easter:nth-child(17) { left: 80%; animation-duration: 19s;  animation-delay: 0.2s; font-size: 28px; }
    .falling-easter:nth-child(18) { left: 90%; animation-duration: 22s;  animation-delay: 1.4s; font-size: 30px; }
    .falling-easter:nth-child(19) { left: 5%;  animation-duration: 16s;  animation-delay: 0.1s; font-size: 24px; }
    .falling-easter:nth-child(20) { left: 12%; animation-duration: 24s;  animation-delay: 1.9s; font-size: 32px; }
    .falling-easter:nth-child(21) { left: 18%; animation-duration: 19s;  animation-delay: 0.5s; font-size: 28px; }
    .falling-easter:nth-child(22) { left: 28%; animation-duration: 23s;  animation-delay: 1.0s; font-size: 30px; }
    .falling-easter:nth-child(23) { left: 38%; animation-duration: 17s;  animation-delay: 0.7s; font-size: 26px; }
    .falling-easter:nth-child(24) { left: 48%; animation-duration: 21s;  animation-delay: 1.6s; font-size: 32px; }
  </style>
</head>

  <!-- 🐰 Écran de chargement de Pâques -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="easter-icon">🐰</div>
      Les œufs se cachent…
    </div>
  </div>

  <!-- ✅ Conteneur React -->
  <div id="root"></div>

  <!-- Masquer l'écran de chargement après le chargement initial -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }, 800);
    });
  </script>

</html>
